<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全域聖典 4.0 體用合一映射矩陣 (雙重型態自適應版)</title>
<style>
  :root {
    --bg-base: #0b0f19;
    --bg-panel: #151b2b;
    --border-dim: #2a3441;
    --text-bright: #f8fafc;
    --text-dim: #64748b;
    
    /* 任務專屬主題色 */
    --color-fto: #f59e0b; /* 琥珀橘 */
    --color-cot: #8b5cf6; /* 科技紫 */
    --color-git: #10b981; /* 終端綠 */
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-base);
    color: var(--text-bright);
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .app-container {
    width: 100%;
    max-width: 950px;
    background: var(--bg-panel);
    border-radius: 12px;
    border: 1px solid var(--border-dim);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* =========================================
     頂部：任務控制列 (流體排版)
  ========================================= */
  .header-controls {
    padding: 20px;
    background: #0f1423;
    border-bottom: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .header-title { margin: 0; font-size: 18px; color: #38bdf8; font-weight: bold; text-align: center; }

  .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
  
  button {
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border: 1px solid var(--border-dim);
    background: #1e293b;
    color: var(--text-bright);
    transition: all 0.3s;
    flex: 1 1 200px; /* 流體按鈕：最小 200px，自動填滿 */
  }

  button:hover { background: #334155; transform: translateY(-1px); }
  .btn-reset { background: transparent; border-style: dashed; color: var(--text-dim); flex: 1 1 100%; }
  .btn-reset:hover { background: #ef4444; color: white; border-style: solid; border-color: #ef4444; }

  /* 按鈕啟動狀態 */
  .btn-fto.active { background: rgba(245, 158, 11, 0.1); border-color: var(--color-fto); color: var(--color-fto); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }
  .btn-cot.active { background: rgba(139, 92, 246, 0.1); border-color: var(--color-cot); color: #c4b5fd; box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
  .btn-git.active { background: rgba(16, 185, 129, 0.1); border-color: var(--color-git); color: var(--color-git); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }

  /* =========================================
     中央：矩陣視圖 (預設為手機端卡片型態)
  ========================================= */
  .matrix-area { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  
  /* 手機版隱藏全域 X 軸標頭 */
  .desktop-header-row { display: none; }

  /* Y 軸列：手機版化身為實體卡片 */
  .matrix-card {
    background: #111827;
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  /* Y 軸標題：手機版化身為卡片標題 */
  .row-header {
    font-size: 15px;
    font-weight: bold;
    color: var(--text-bright);
    text-align: center;
    border-bottom: 1px dashed var(--border-dim);
    padding-bottom: 12px;
    margin-bottom: 15px;
  }

  /* 資料格容器：手機版為雙欄排版 */
  .cells-wrapper {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  /* 矩陣交叉點 (Cell) */
  .cell {
    background: #0b0f19;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 12px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #334155;
    transition: all 0.3s;
    position: relative;
    min-height: 70px;
  }
  
  /* 手機版專屬的內建 X 軸標籤 */
  .mobile-x-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; letter-spacing: 1px; }
  .cell-status { font-size: 11px; margin-top: 4px; opacity: 0.7; }
  .cell-content { display: flex; flex-direction: column; align-items: center; }

  /* 啟動發光特效 (Glow) */
  .cell.glow-fto {
    background: rgba(245, 158, 11, 0.15); border-color: var(--color-fto); color: var(--color-fto);
    box-shadow: 0 0 15px rgba(245, 158, 11, 0.3) inset, 0 0 10px rgba(245, 158, 11, 0.4);
    transform: translateY(-2px); font-weight: bold; z-index: 2;
  }
  .cell.glow-cot {
    background: rgba(139, 92, 246, 0.15); border-color: var(--color-cot); color: #c4b5fd;
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.3) inset, 0 0 10px rgba(139, 92, 246, 0.4);
    transform: translateY(-2px); font-weight: bold; z-index: 2;
  }
  .cell.glow-git {
    background: rgba(16, 185, 129, 0.15); border-color: var(--color-git); color: var(--color-git);
    box-shadow: 0 0 15px rgba(16, 185, 129, 0.3) inset, 0 0 10px rgba(16, 185, 129, 0.4);
    transform: translateY(-2px); font-weight: bold; z-index: 2;
  }

  /* 底部：動態解說區 */
  .explanation-area {
    padding: 20px;
    background: #0b0f19;
    border-top: 1px solid var(--border-dim);
    border-left: 4px solid var(--border-dim);
    transition: border-color 0.3s;
  }

  .explanation-title { margin: 0 0 10px 0; font-size: 14px; color: var(--text-bright); display: flex; align-items: center; gap: 8px; }
  .explanation-text { margin: 0; font-size: 14px; line-height: 1.6; color: #cbd5e1; }

  /* =========================================
     降維打擊魔法：電腦版恢復 3x6 網格 
  ========================================= */
  @media (min-width: 800px) {
    .header-title { text-align: left; }
    .btn-reset { flex: 0 1 150px; } /* 電腦版讓重置按鈕變小靠右 */
    
    /* 啟動網格系統 */
    .matrix-area { 
      display: grid; 
      grid-template-columns: 140px repeat(6, 1fr); 
      gap: 10px; 
      padding: 30px 25px; 
    }

    /* 顯示全域 X 軸標頭，並解除外框封印 */
    .desktop-header-row { display: contents; }
    .header-corner { display: block; }
    .header-x {
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: bold; color: var(--text-dim);
      border-bottom: 1px solid var(--border-dim); padding-bottom: 10px;
    }

    /* 終極黑魔法 display: contents 
       這會將卡片「隱形」，讓裡面的子元素直接受外層的 Grid 管轄！ */
    .matrix-card { display: contents; }
    .cells-wrapper { display: contents; }

    /* 卡片標題變回 Y 軸側邊標題 */
    .row-header {
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 15px; margin: 0;
      border-bottom: none; border-right: 1px solid var(--border-dim);
      text-align: right; font-size: 14px; color: var(--text-dim);
    }

    /* 隱藏手機版專用內嵌標籤 */
    .mobile-x-label { display: none; }
    .cell { padding: 10px; min-height: 60px; }
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header-controls">
    <h2 class="header-title">全域聖典 4.0 體用合一映射矩陣</h2>
    <div class="btn-group">
      <button id="btn-fto" class="btn-fto" onclick="activateTask('fto')">CAO 專利侵權判定 (FTO)</button>
      <button id="btn-cot" class="btn-cot" onclick="activateTask('cot')">機電研發算力推演 (CoT)</button>
      <button id="btn-git" class="btn-git" onclick="activateTask('git')">全域資料無縫同步</button>
      <button class="btn-reset" onclick="resetMatrix()">🔄 重置矩陣</button>
    </div>
  </div>

  <div class="matrix-area" id="grid"></div>

  <div class="explanation-area" id="exp-box">
    <h3 class="explanation-title">📍 動態物理執行路徑解說</h3>
    <p class="explanation-text" id="exp-text">矩陣預設為休眠狀態。請點擊上方任務按鈕以啟動映射。</p>
  </div>
</div>

<script>
  // 體用座標軸定義
  const bodyY = [
    { id: 'A', name: 'A (S24 行動端)' },
    { id: 'B', name: 'B (128GB 母艦)' },
    { id: 'C', name: 'C (雲端/智能體)' }
  ];
  const useX = [
    { id: 'A', name: 'A (感知)' },
    { id: 'B', name: 'B (收割)' },
    { id: 'C', name: 'C (思維)' },
    { id: 'D', name: 'D (執行)' },
    { id: 'Omega', name: 'Ω (逆向)' },
    { id: '0', name: '0 (防禦)' }
  ];

  // 任務資料字典
  const taskMap = {
    fto: {
      colorClass: 'glow-fto',
      btnId: 'btn-fto',
      borderColor: 'var(--color-fto)',
      cells: ['B-B', 'B-C', 'B-0'],
      desc: '母艦啟動重型 RAG。透過公路 B 爬取專利，交由公路 C 進行 FTO 邏輯拆解，並由公路 0 執行資安防禦。'
    },
    cot: {
      colorClass: 'glow-cot',
      btnId: 'btn-cot',
      borderColor: 'var(--color-cot)',
      cells: ['C-A', 'C-C', 'C-Omega'],
      desc: '雲端啟動無限算力。由公路 A 接收參數，於公路 C 展開深度 CoT 思維鏈推演，並透過公路 Ω 逆向解析對手規格。'
    },
    git: {
      colorClass: 'glow-git',
      btnId: 'btn-git',
      borderColor: 'var(--color-git)',
      cells: ['A-A', 'B-D'],
      desc: 'S24 行動端透過公路 A 捕獲即時靈感，直接穿透隧道，交由母艦的公路 D 執行 Git 同步寫入實體硬碟。'
    }
  };

  const grid = document.getElementById('grid');

  // 動態構建具備「雙重物理型態」的 DOM 結構
  function renderGrid() {
    grid.innerHTML = '';

    // 1. 構建桌機版全域 X 軸 (手機版隱藏)
    const headerRow = document.createElement('div');
    headerRow.className = 'desktop-header-row';
    headerRow.innerHTML = `<div class="header-corner"></div>`;
    useX.forEach(x => {
      const xLabel = document.createElement('div');
      xLabel.className = 'header-x';
      xLabel.innerText = x.name;
      headerRow.appendChild(xLabel);
    });
    grid.appendChild(headerRow);

    // 2. 構建 Y 軸資料 (手機版為卡片，桌機版被 display:contents 攤平為 Grid Row)
    bodyY.forEach(y => {
      const card = document.createElement('div');
      card.className = 'matrix-card';
      
      // 卡片標題 / 桌機 Y 軸標題
      const yLabel = document.createElement('div');
      yLabel.className = 'row-header';
      yLabel.innerText = y.name;
      card.appendChild(yLabel);

      // 該列的資料格容器
      const cellsWrapper = document.createElement('div');
      cellsWrapper.className = 'cells-wrapper';

      useX.forEach(x => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${y.id}-${x.id}`;
        
        // 內嵌手機版專用的 X 軸標籤 (桌機版隱藏)
        cell.innerHTML = `
          <div class="mobile-x-label">${x.name}</div>
          <div class="cell-content">
            <span>休眠</span>
            <span class="cell-status">Dormant</span>
          </div>
        `;
        cellsWrapper.appendChild(cell);
      });

      card.appendChild(cellsWrapper);
      grid.appendChild(card);
    });
  }

  // 系統重置
  function resetMatrix(isFullReset = true) {
    document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
    
    document.querySelectorAll('.cell').forEach(cell => {
      cell.className = 'cell'; 
      cell.querySelector('.cell-content').innerHTML = `<span>休眠</span><span class="cell-status">Dormant</span>`;
    });

    if (isFullReset) {
      document.getElementById('exp-text').innerText = '矩陣預設為休眠狀態。請點擊上方任務按鈕以啟動映射。';
      document.getElementById('exp-box').style.borderLeftColor = 'var(--border-dim)';
    }
  }

  // 啟動任務
  function activateTask(taskKey) {
    resetMatrix(false); 
    const data = taskMap[taskKey];
    
    document.getElementById(data.btnId).classList.add('active');

    data.cells.forEach(coord => {
      const cell = document.getElementById(`cell-${coord}`);
      if (cell) {
        cell.classList.add(data.colorClass);
        cell.querySelector('.cell-content').innerHTML = `<span style="color:currentColor;">活躍</span><span class="cell-status" style="color:currentColor;">Active</span>`;
      }
    });

    document.getElementById('exp-text').innerText = data.desc;
    document.getElementById('exp-box').style.borderLeftColor = data.borderColor;
  }

  // 載入執行
  renderGrid();

</script>
</body>
</html>
