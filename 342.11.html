<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #222; color: white; text-align: center; font-family: sans-serif; }
  .box { border: 1px solid #555; padding: 10px; margin: 10px; display: inline-block; min-width: 80px; }
  button { padding: 10px; margin: 5px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
  #msg { color: #f0ad4e; margin: 15px; min-height: 20px; }
</style>
</head>
<body>
  <h3>Git 邏輯測試版</h3>
  <div>
    <div class="box">工作區: <b id="ws">0</b></div>
    <div class="box">地端: <b id="loc">v1</b></div>
    <div class="box">雲端: <b id="rem">v1</b></div>
  </div>
  <hr>
  <button onclick="edit()">修改筆記</button>
  <button onclick="commit()">Commit</button>
  <button onclick="push()">Push</button>
  <button onclick="sim()">同事上傳</button>
  <button onclick="pull()">Pull</button>
  <div id="msg">等待操作...</div>

  <script>
    let ws=0, loc=1, rem=1;
    function update() {
      document.getElementById('ws').innerText = ws;
      document.getElementById('loc').innerText = 'v' + loc;
      document.getElementById('rem').innerText = 'v' + rem;
    }
    function edit() { ws++; update(); msg("您修改了檔案"); }
    function commit() { if(ws>0){loc++; ws=0; update(); msg("Commit 成功");} else {msg("沒東西可存");} }
    function push() { if(loc>rem && ws==0){rem=loc; update(); msg("Push 成功");} else {msg("無法 Push (檢查 Commit 了沒)");} }
    function sim() { rem++; update(); msg("警告：雲端有新版 v" + rem); }
    function pull() { if(rem>loc){loc=rem; ws=0; update(); msg("Pull 成功");} else {msg("已是最新版");} }
    function msg(t) { document.getElementById('msg').innerText = t; }
  </script>
</body>
</html>
