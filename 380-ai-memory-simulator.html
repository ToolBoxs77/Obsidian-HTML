<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 物理過濾網：上下文與向量污染模擬器 (流體防禦版)</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --panel-bg: #1e293b;
    --border: #334155;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    
    --color-source: #3b82f6;
    --color-context: #d946ef;
    --color-abyss: #ef4444;
    --color-ghost: #8b5cf6;
    --color-success: #10b981;
  }

  /* 全局強制內邊距不撐破寬度 */
  * { box-sizing: border-box; }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: var(--bg-dark); color: var(--text-main); 
    margin: 0; padding: 15px; 
    display: flex; justify-content: center; min-height: 100vh; 
  }
  
  .container { 
    width: 100%; max-width: 900px; background: var(--panel-bg); 
    border-radius: 12px; border: 1px solid var(--border); 
    box-shadow: 0 15px 35px rgba(0,0,0,0.5); overflow: hidden; 
    display: flex; flex-direction: column; 
  }

  /* 頂部控制列：全面流體化 */
  .controls-header { background: #18212f; padding: 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; }
  
  /* 輸入區：空間不夠自動折行 */
  .control-row { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; }
  
  /* 群組強制上下排列，防止文字被擠斷 */
  .input-group, .toggle-wrapper { 
    display: flex; flex-direction: column; gap: 10px; 
    flex: 1 1 250px; /* 最小寬度 250px，否則折行 */
  }
  
  .input-group label, .toggle-wrapper label { font-size: 14px; font-weight: bold; color: var(--text-main); }
  
  select { 
    padding: 12px; background: #0f172a; color: white; border: 1px solid #475569; 
    border-radius: 6px; font-size: 14px; cursor: pointer; width: 100%; 
  }
  
  /* 開關 Toggle */
  .toggle-container { display: flex; align-items: center; gap: 12px; }
  .switch { position: relative; display: inline-block; width: 48px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .3s; border-radius: 26px; }
  .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--color-abyss); }
  input:checked + .slider:before { transform: translateX(22px); }

  /* 按鈕群 */
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
  button { 
    padding: 14px; border: none; border-radius: 6px; font-weight: bold; 
    cursor: pointer; transition: 0.2s; font-size: 14px; 
    flex: 1 1 150px; /* 最小寬度 150px，自動填滿 */
    display: flex; align-items: center; justify-content: center; gap: 6px; 
  }
  .btn-execute { background: var(--color-source); color: white; }
  .btn-execute:hover { background: #2563eb; }
  .btn-execute:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-reset { background: #475569; color: white; }
  .btn-reset:hover { background: #334155; }
  
  .btn-purge { background: #f59e0b; color: #000; display: none; animation: pulseBtn 1.5s infinite; flex: 1 1 100%; }
  .btn-purge:hover { background: #d97706; }

  /* 狀態列 */
  .status-bar { padding: 15px 20px; background: #000; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--color-success); font-family: monospace; min-height: 20px; line-height: 1.6; }

  /* 畫布區塊：流體佈局 */
  .workspace { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; min-height: 400px; align-items: stretch; }
  
  /* 左區塊與右區塊的自動斷行設定 */
  .zone-left { flex: 1 1 250px; display: flex; flex-direction: column; }
  .zone-right { flex: 2 1 300px; display: flex; flex-direction: column; gap: 20px; }
  
  .zone { background: #0f172a; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 2px dashed #334155; position: relative; }
  .zone-title { font-size: 14px; font-weight: bold; margin: 0; padding-bottom: 10px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 8px; }
  
  #zone-source { border-color: var(--color-source); height: 100%; min-height: 150px; }
  #zone-context { border-color: var(--color-context); min-height: 150px; }
  #zone-abyss { border-color: var(--color-abyss); background: #1a0a0a; flex: 1; min-height: 150px; }
  
  .block-container { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 10px; }

  /* 資料區塊 (Blocks) */
  .data-block { 
    padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; 
    background: #1e293b; border: 1px solid #475569; color: white;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    animation: popIn 0.3s ease-out forwards;
  }
  
  .data-block.prefix { border-color: var(--color-success); color: var(--color-success); background: rgba(16, 185, 129, 0.1); }
  .data-block.suffix { border-color: var(--color-source); color: var(--color-source); background: rgba(59, 130, 246, 0.1); }
  .data-block.lost { border-color: var(--color-abyss); color: #fca5a5; background: rgba(239, 68, 68, 0.1); text-decoration: line-through; opacity: 0.8; }
  .data-block.full { border-color: #fcd34d; color: #fcd34d; background: rgba(252, 211, 77, 0.1); }
  .data-block.ghost { border-color: var(--color-ghost); color: #c4b5fd; background: rgba(139, 92, 246, 0.2); border-style: dashed; }
  .data-block.destroying { transform: scale(0); opacity: 0; }

  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
</style>
</head>
<body>

<div class="container">
  <div class="controls-header">
    <div class="control-row">
      <div class="input-group">
        <label>1. 選擇輸入機制：</label>
        <select id="input-mode" onchange="checkState()">
          <option value="upload">📄 大檔案上傳 (Large File Upload)</option>
          <option value="paste">📝 純文字貼上 (Direct Paste)</option>
        </select>
      </div>
      
      <div class="toggle-wrapper">
        <label>2. 啟動同名檔案污染：</label>
        <div class="toggle-container">
          <label class="switch">
            <input type="checkbox" id="pollution-toggle" onchange="toggleState()">
            <span class="slider"></span>
          </label>
          <span id="toggle-label" style="color: var(--text-muted); font-size: 13px;">關閉 (Off)</span>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-execute" class="btn-execute" onclick="executeWrite()">▶ 3. 執行寫入 (Execute)</button>
      <button id="btn-reset" class="btn-reset" onclick="resetSystem()">🔄 重置系統 (Reset)</button>
      <button id="btn-purge" class="btn-purge" onclick="executePurge()">🔥 清除幽靈快取 (Purge Cache)</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    系統就緒。請選擇參數並點擊「執行寫入」。
  </div>

  <div class="workspace">
    <div class="zone-left">
      <div class="zone" id="zone-source">
        <h3 class="zone-title" style="color: var(--color-source);">📄 來源檔案 (Source)</h3>
        <div class="block-container" id="container-source"></div>
      </div>
    </div>
    
    <div class="zone-right">
      <div class="zone" id="zone-context">
        <h3 class="zone-title" style="color: var(--color-context);">🧠 AI 金鑰區 (Context Window)</h3>
        <div class="block-container" id="container-context"></div>
      </div>
      
      <div class="zone" id="zone-abyss">
        <h3 class="zone-title" style="color: var(--color-abyss);">🕳️ 物理深淵 (The Abyss)</h3>
        <div class="block-container" id="container-abyss"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const elMode = document.getElementById('input-mode');
  const elPollution = document.getElementById('pollution-toggle');
  const toggleLabel = document.getElementById('toggle-label');
  const btnExecute = document.getElementById('btn-execute');
  const btnPurge = document.getElementById('btn-purge');
  const statusBar = document.getElementById('status-bar');
  
  const cSource = document.getElementById('container-source');
  const cContext = document.getElementById('container-context');
  const cAbyss = document.getElementById('container-abyss');

  let hasExecuted = false;

  function createBlock(id, label, className = '') {
    const div = document.createElement('div');
    div.className = `data-block ${className}`;
    div.id = `block-${id}`;
    div.innerText = label;
    return div;
  }

  function setStatus(text, color = "var(--color-success)") {
    statusBar.innerHTML = "> " + text;
    statusBar.style.color = color;
  }

  function toggleState() {
    toggleLabel.innerText = elPollution.checked ? "啟動 (On)" : "關閉 (Off)";
    toggleLabel.style.color = elPollution.checked ? "var(--color-abyss)" : "var(--text-muted)";
    checkState();
  }

  function checkState() {
    if (hasExecuted) resetSystem();
  }

  function resetSystem() {
    hasExecuted = false;
    btnExecute.disabled = false;
    btnPurge.style.display = 'none'; 
    
    cSource.innerHTML = '';
    cContext.innerHTML = '';
    cAbyss.innerHTML = '';

    for (let i = 1; i <= 10; i++) {
      cSource.appendChild(createBlock(`src-${i}`, `區塊 ${i}`));
    }
    
    setStatus("系統已重置。等待執行...");
  }

  const delay = ms => new Promise(res => setTimeout(res, ms));

  async function executeWrite() {
    hasExecuted = true;
    btnExecute.disabled = true; 
    
    const mode = elMode.value;
    const isPolluted = elPollution.checked;
    
    cSource.innerHTML = '';

    if (mode === 'upload' && !isPolluted) {
      setStatus("解析中... 發生 UI 片段化 (UI Snippetting)", "#facc15");
      for(let i=1; i<=3; i++) { cContext.appendChild(createBlock(`c-${i}`, `區塊 ${i}`, 'prefix')); await delay(100); }
      for(let i=4; i<=7; i++) { cAbyss.appendChild(createBlock(`a-${i}`, `區塊 ${i}`, 'lost')); await delay(100); }
      for(let i=8; i<=10; i++) { cContext.appendChild(createBlock(`c-${i}`, `區塊 ${i}`, 'suffix')); await delay(100); }
      setStatus("UI 片段化發生：頭尾被擷取，中間資料掉入深淵 (Lost in the Middle)。", "#facc15");
    } 
    else if (mode === 'upload' && isPolluted) {
      setStatus("解析中... 檢索到同名檔案，載入快取陰影！", "#ef4444");
      
      cContext.appendChild(createBlock('ghost-1', '👻 舊版快取 V1', 'ghost')); await delay(150);
      cContext.appendChild(createBlock('ghost-2', '👻 舊版快取 V2', 'ghost')); await delay(150);
      
      cContext.appendChild(createBlock('c-1', '區塊 1', 'prefix')); await delay(100);
      cContext.appendChild(createBlock('c-10', '區塊 10', 'suffix')); await delay(100);
      
      for(let i=2; i<=9; i++) { cAbyss.appendChild(createBlock(`a-${i}`, `區塊 ${i}`, 'lost')); await delay(80); }
      
      setStatus("快取陰影發生：同名檔案導致向量污染，舊記憶產生物理性錯位。", "#ef4444");
      btnPurge.style.display = 'flex';
      
    } 
    else if (mode === 'paste') {
      setStatus("解析中... 直接貼上繞過 UI 切割", "var(--color-success)");
      for(let i=1; i<=10; i++) { cContext.appendChild(createBlock(`c-${i}`, `區塊 ${i}`, 'full')); await delay(80); }
      setStatus("純文字貼上：繞過前端 UI 切割，100% 佔據上下文空間。", "var(--color-success)");
    }
  }

  async function executePurge() {
    btnPurge.style.display = 'none';
    setStatus("執行強制對齊指令... 正在摧毀幽靈快取", "#f59e0b");

    const ghosts = document.querySelectorAll('.ghost');
    ghosts.forEach(g => g.classList.add('destroying'));
    await delay(400);
    ghosts.forEach(g => g.remove());

    setStatus("快取已清除。正在從深淵撈回正確上下文...", "#3b82f6");
    await delay(300);

    const blocksToRecover = [2, 3, 8, 9];
    for (let id of blocksToRecover) {
      const abyssBlock = document.getElementById(`block-a-${id}`);
      if (abyssBlock) {
        abyssBlock.classList.add('destroying');
        await delay(100);
      }
    }
    
    for (let id of blocksToRecover) {
      const abyssBlock = document.getElementById(`block-a-${id}`);
      if (abyssBlock) abyssBlock.remove();
    }

    cContext.innerHTML = ''; 
    cContext.appendChild(createBlock(`c-1`, `區塊 1`, 'prefix')); await delay(50);
    cContext.appendChild(createBlock(`c-2`, `區塊 2`, 'prefix')); await delay(50);
    cContext.appendChild(createBlock(`c-3`, `區塊 3`, 'prefix')); await delay(50);
    cContext.appendChild(createBlock(`c-8`, `區塊 8`, 'suffix')); await delay(50);
    cContext.appendChild(createBlock(`c-9`, `區塊 9`, 'suffix')); await delay(50);
    cContext.appendChild(createBlock(`c-10`, `區塊 10`, 'suffix')); await delay(50);

    setStatus("強制對齊完成：舊記憶已清空，真實上下文已恢復！<br><span style='color:#94a3b8; font-size:12px; margin-top:5px; display:block;'>* 註：中間區塊仍因大檔案特性掉入深淵，但幽靈污染已解除。</span>", "var(--color-success)");
  }

  // 初始化
  resetSystem();
</script>
</body>
</html>
