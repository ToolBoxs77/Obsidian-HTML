<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 上下文與記憶檢索模擬器</title>
<style>
  :root {
    --bg-main: #121212;
    --bg-panel: #1e1e1e;
    --text-main: #e0e0e0;
    --text-muted: #888;
    --color-upload: #3b82f6; /* Blue */
    --color-paste: #eab308;  /* Gold */
    --color-lost: #4b5563;   /* Gray */
    --color-polluted: #ef4444; /* Red */
    --border-color: #333;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  
  .container {
    width: 100%;
    max-width: 800px;
    background: var(--bg-panel);
    border-radius: 12px;
    border: 1px solid var(--border-color);
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  
  .header { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
  .header h2 { margin: 0; display: flex; align-items: center; gap: 10px; color: #a855f7; }

  /* 控制面板 */
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #181818; padding: 15px; border-radius: 8px; }
  .control-group { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 13px; font-weight: bold; color: var(--text-muted); }
  select { padding: 10px; background: #2d2d2d; color: white; border: 1px solid #555; border-radius: 6px; cursor: pointer; font-size: 14px; }
  
  /* 開關 Toggle */
  .toggle-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
  .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--color-polluted); }
  input:checked + .slider:before { transform: translateX(20px); }

  /* 畫布與記憶體視覺化 */
  .canvas { background: #111; border: 1px dashed #444; border-radius: 8px; padding: 20px; min-height: 180px; display: flex; flex-direction: column; gap: 10px; }
  .memory-window { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; padding: 10px; background: #222; border-radius: 6px; border: 1px solid #333; }
  
  /* 記憶區塊樣式 */
  .chunk { padding: 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; flex: 1 1 18%; min-width: 80px; }
  
  .chunk.upload-good { background: rgba(59, 130, 246, 0.2); border: 1px solid var(--color-upload); color: #93c5fd; }
  .chunk.upload-lost { background: rgba(75, 85, 99, 0.2); border: 1px dashed var(--color-lost); color: var(--color-lost); text-decoration: line-through; }
  .chunk.paste-gold { background: rgba(234, 179, 8, 0.2); border: 2px solid var(--color-paste); color: var(--color-paste); flex: 1 1 100%; font-size: 16px; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
  .chunk.polluted { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--color-polluted); color: #fca5a5; }

  /* 顯示動畫 class */
  .chunk.show { opacity: 1; transform: translateY(0); }

  /* 按鈕區 */
  .actions { display: flex; gap: 10px; margin-top: 20px; }
  button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
  .btn-run { background: #a855f7; color: white; flex: 1; }
  .btn-run:hover { background: #9333ea; }
  .btn-reset { background: #444; color: white; flex: 0.5; }
  .btn-reset:hover { background: #555; }
  .btn-prompt { background: #10b981; color: white; width: 100%; margin-top: 15px; display: none; }
  .btn-prompt:hover { background: #059669; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 狀態與提示詞顯示區 */
  .status-box { margin-top: 15px; padding: 15px; background: #000; border-radius: 6px; border-left: 4px solid #a855f7; font-size: 13px; line-height: 1.5; color: #d1d5db; min-height: 40px; }
  .prompt-output { margin-top: 15px; padding: 15px; background: #2d2418; border: 1px solid var(--color-paste); border-radius: 6px; font-family: monospace; font-size: 14px; color: var(--color-paste); display: none; white-space: pre-wrap; }

</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>🧠 AI 上下文與記憶檢索模擬器</h2>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>資料輸入模式 (Input Mode)</label>
      <select id="mode-select" onchange="resetSim()">
        <option value="upload">📄 檔案上傳模式 (Chunks 檢索)</option>
        <option value="paste">📝 直接貼上文字 (100% 佔據金鑰區)</option>
      </select>
    </div>
    
    <div class="control-group">
      <label>向量檢索干擾</label>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="pollution-toggle" onchange="resetSim()">
          <span class="slider"></span>
        </label>
        <span style="font-size:13px; color:#ef4444;">模擬重複檔名污染</span>
      </div>
    </div>
  </div>

  <div class="canvas">
    <label style="color:#aaa;">AI 短期記憶視窗 (Context Window)</label>
    <div class="memory-window" id="memory-window">
      </div>
  </div>

  <div class="actions">
    <button id="btn-run" class="btn-run" onclick="runSim()">▶ 執行模擬</button>
    <button class="btn-reset" onclick="resetSim()">🔄 重置</button>
  </div>

  <div class="status-box" id="status-box">
    等待設定... 請選擇模式並點擊「執行模擬」。
  </div>

  <button id="btn-prompt" class="btn-prompt" onclick="showPrompt()">✨ 去重與優化指令產生器</button>
  <div id="prompt-output" class="prompt-output"></div>

</div>

<script>
  const modeSelect = document.getElementById('mode-select');
  const pollutionToggle = document.getElementById('pollution-toggle');
  const memoryWindow = document.getElementById('memory-window');
  const statusBox = document.getElementById('status-box');
  const btnRun = document.getElementById('btn-run');
  const btnPrompt = document.getElementById('btn-prompt');
  const promptOutput = document.getElementById('prompt-output');

  // 初始化與重置系統
  function resetSim() {
    memoryWindow.innerHTML = '';
    statusBox.innerHTML = `系統已重置。當前模式：${modeSelect.options[modeSelect.selectedIndex].text}`;
    statusBox.style.borderLeftColor = '#a855f7';
    btnRun.disabled = false;
    btnPrompt.style.display = 'none';
    promptOutput.style.display = 'none';
  }

  // 延遲添加元素的輔助函數 (製造逐塊載入的動畫感)
  async function addChunk(text, className, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const chunk = document.createElement('div');
        chunk.className = `chunk ${className}`;
        chunk.innerText = text;
        memoryWindow.appendChild(chunk);
        
        // 觸發 CSS 動畫
        setTimeout(() => chunk.classList.add('show'), 50);
        resolve();
      }, delay);
    });
  }

  // 執行主模擬流程
  async function runSim() {
    btnRun.disabled = true;
    memoryWindow.innerHTML = '';
    const mode = modeSelect.value;
    const isPolluted = pollutionToggle.checked;

    if (mode === 'upload') {
      // ===== 檔案上傳模式 =====
      statusBox.style.borderLeftColor = 'var(--color-upload)';
      statusBox.innerHTML = "正在切割檔案並進行向量檢索 (RAG)...";
      
      const chunksData = [];
      // 構建 10 個區塊的邏輯
      for (let i = 1; i <= 10; i++) {
        if (isPolluted && (i === 2 || i === 8)) {
          // 污染模式下，混入舊版資料
          chunksData.push({ text: `⚠️ 舊版資料 v1 (污染)`, class: 'polluted' });
        } else if (i >= 4 && i <= 7) {
          // 4~7 點在中間，模擬 Lost in the middle
          chunksData.push({ text: `第 ${i} 點 (中間遺失)`, class: 'upload-lost' });
        } else {
          // 頭尾區塊
          chunksData.push({ text: `第 ${i} 點 (首尾保留)`, class: 'upload-good' });
        }
      }

      // 逐一繪製區塊
      for (const data of chunksData) {
        await addChunk(data.text, data.class, 150);
      }

      if (isPolluted) {
        statusBox.innerHTML = "<b>【警告】發生 Lost in the middle 且向量庫遭污染！</b><br>檔案太大導致中間內容被截斷遺失，且因為「檔名重複」，檢索系統錯誤抓取了舊版殘留資料。";
        btnPrompt.style.display = 'block'; // 顯示指令產生器
      } else {
        statusBox.innerHTML = "<b>發生 Lost in the middle 現象。</b><br>由於大模型對長文檔的注意力機制缺陷，開頭與結尾的資訊被保留，但中間段落 (第 4-7 點) 在處理中遺失了。";
      }

    } else if (mode === 'paste') {
      // ===== 直接貼上模式 =====
      statusBox.style.borderLeftColor = 'var(--color-paste)';
      statusBox.innerHTML = "直接貼上文字：繞過 RAG 向量切塊，直接塞入 Prompt 上下文...";
      
      if (isPolluted) {
        // 即使貼上文字，如果開啟污染，模擬系統預先塞了舊快取
        await addChunk("⚠️ 舊版全域快取 (污染)", "polluted", 200);
        await addChunk("📝 貼上之文字內容 (100% 完整保留)", "paste-gold", 300);
        statusBox.innerHTML = "<b>文字完整保留，但上下文被舊快取污染。</b><br>貼上的文字 100% 佔據了金鑰區，但因為未清空歷史對話/快取，AI 仍可能被舊資料干擾。";
        btnPrompt.style.display = 'block';
      } else {
        await addChunk("📝 貼上之文字內容 (100% 佔據金鑰區，無任何遺失)", "paste-gold", 200);
        statusBox.innerHTML = "<b>最佳狀態：文字 100% 佔據短期記憶金鑰區。</b><br>因為沒有經過外部資料庫切塊，所有文字被完整放入 Context Window，不會發生中間遺失。";
      }
    }
    
    // 執行完畢不解鎖按鈕，迫使用戶按重置才能跑下一次，防止疊加混亂
  }

  // 產生指令
  function showPrompt() {
    promptOutput.style.display = 'block';
    promptOutput.innerHTML = "「架構師，執行全域快取清理，忽略所有歷史檔名為 X 的殘留區塊，僅鎖定本輪次上傳/貼上之文字為唯一真理。」";
    statusBox.innerHTML = "已產生除錯指令！請複製下方指令貼給 AI，強制它鎖定最新記憶。";
  }

  // 初次載入初始化
  resetSim();
</script>

</body>
</html>
