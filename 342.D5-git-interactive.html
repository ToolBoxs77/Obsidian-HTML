<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git 雙地協作同步邏輯測試 (平行宇宙透析版)</title>
<style>
  /* 基礎設定 */
  body { 
    background: #1e1e2e; color: #cdd6f4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    margin: 0; padding: 20px; box-sizing: border-box; text-align: center;
  }
  .container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  h2 { margin-top: 0; color: #89b4fa; }

  /* 視覺區塊配置 */
  .architecture { 
    display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%;
    background: #313244; padding: 20px; border-radius: 12px; box-sizing: border-box;
  }

  .cloud-node {
    background: #89b4fa; color: #11111b; padding: 15px 30px; border-radius: 8px; font-weight: bold;
    width: fit-content; margin: 0 auto; border: 2px solid #b4befe;
    box-shadow: 0 0 15px rgba(137, 180, 250, 0.3);
  }

  .local-nodes {
    display: flex; justify-content: space-around; width: 100%; gap: 15px; flex-wrap: wrap;
  }
  
  .pc-node {
    background: #45475a; padding: 15px; border-radius: 8px; flex: 1; min-width: 220px;
    border: 2px solid #585b70; display: flex; flex-direction: column; gap: 5px; text-align: left;
  }
  .pc-node h3 { margin: 0 0 10px 0; font-size: 16px; color: #f38ba8; text-align: center; }
  .pc-node.pc-b h3 { color: #a6e3a1; }
  
  .status-text { font-size: 22px; font-weight: bold; color: #f9e2af; display: inline-block; margin-left: 5px; }
  .info-row { font-size: 13px; margin: 3px 0; display: flex; justify-content: space-between; align-items: center; padding-bottom: 2px; }
  
  /* 算式分隔線 */
  .math-line { border-top: 2px dashed #7f849c; margin: 8px 0; }

  /* 操作面板 */
  .control-panel {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;
    background: #313244; padding: 20px; border-radius: 12px; box-sizing: border-box;
  }
  
  .control-group { display: flex; flex-direction: column; gap: 10px; }
  .control-group h4 { margin: 0; font-size: 15px; color: #cba6f7; border-bottom: 1px dashed #585b70; padding-bottom: 5px; }

  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  button { 
    padding: 10px; cursor: pointer; background: #585b70; color: white; border: none; 
    border-radius: 6px; font-size: 13px; font-weight: bold; transition: 0.2s; 
  }
  button:hover { background: #7f849c; transform: translateY(-1px); }
  
  .btn-edit { background: #f38ba8; color: #11111b; }
  .btn-commit { background: #cba6f7; color: #11111b; }
  .btn-push { background: #89b4fa; color: #11111b; }
  .btn-pull { background: #a6e3a1; color: #11111b; }
  .btn-reset { background: transparent; border: 1px dashed #f38ba8; color: #f38ba8; margin-top: 10px; }
  .btn-reset:hover { background: #f38ba8; color: #11111b; }

  /* 訊息框 (支援多行與換行) */
  #msg-box { 
    background: #181825; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px;
    color: #f9e2af; border-left: 4px solid #f9e2af; min-height: 60px; text-align: left;
    white-space: pre-line; line-height: 1.6;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Git 雙地同步：平行宇宙透析儀</h2>

  <div class="architecture">
    <div class="cloud-node">
      ☁️ 雲端基準倉庫 (Remote Base)<br>
      目前進度: <span class="status-text" id="status-cloud">v1</span>
    </div>

    <div style="color: #6c7086; font-weight: bold;">↑ 網路同步 ↓</div>

    <div class="local-nodes">
      <div class="pc-node">
        <h3>💻 電腦 A (辦公室)</h3>
        <div class="info-row"><span>基準點 (Base):</span> <b id="base-a" style="color:#89b4fa;">v1</b></div>
        <div class="info-row"><span>+ 待推播節點 (Commits):</span> <b id="commits-a" style="color:#cba6f7;">0</b></div>
        <div class="info-row"><span>+ 未存檔修改 (Changes):</span> <b id="ws-a" style="color:#eba0ac;">0</b></div>
        <div class="math-line"></div>
        <div class="info-row" style="border:none;"><span>= 本地總版本:</span> <span class="status-text" id="status-a">v1</span></div>
      </div>
      
      <div class="pc-node pc-b">
        <h3>💻 電腦 B (家裡)</h3>
        <div class="info-row"><span>基準點 (Base):</span> <b id="base-b" style="color:#89b4fa;">v1</b></div>
        <div class="info-row"><span>+ 待推播節點 (Commits):</span> <b id="commits-b" style="color:#cba6f7;">0</b></div>
        <div class="info-row"><span>+ 未存檔修改 (Changes):</span> <b id="ws-b" style="color:#eba0ac;">0</b></div>
        <div class="math-line"></div>
        <div class="info-row" style="border:none;"><span>= 本地總版本:</span> <span class="status-text" id="status-b">v1</span></div>
      </div>
    </div>
  </div>

  <div class="control-panel">
    <div class="control-group">
      <h4 style="color: #f38ba8;">操作電腦 A</h4>
      <div class="btn-grid">
        <button class="btn-edit" onclick="action('edit', 'A')">1. 寫筆記 (Edit)</button>
        <button class="btn-commit" onclick="action('commit', 'A')">2. 存檔 (Commit)</button>
        <button class="btn-push" onclick="action('push', 'A')">3. 推送 (Push)</button>
        <button class="btn-pull" onclick="action('pull', 'A')">4. 拉取 (Pull)</button>
      </div>
    </div>

    <div class="control-group">
      <h4 style="color: #a6e3a1;">操作電腦 B</h4>
      <div class="btn-grid">
        <button class="btn-edit" onclick="action('edit', 'B')">1. 寫筆記 (Edit)</button>
        <button class="btn-commit" onclick="action('commit', 'B')">2. 存檔 (Commit)</button>
        <button class="btn-push" onclick="action('push', 'B')">3. 推送 (Push)</button>
        <button class="btn-pull" onclick="action('pull', 'B')">4. 拉取 (Pull)</button>
      </div>
    </div>
  </div>

  <button class="btn-reset" onclick="resetSim()">🔄 全局重置 (Reset)</button>

  <div id="msg-box">系統就緒。請觀測上方「本地總版本」的加法公式，它將為您揭開 v4 的誕生之謎。</div>
</div>

<script>
  // 真實 Git 邏輯狀態模型
  let state = {};

  function init() {
    state = {
      cloud_v: 1, // 雲端絕對版本號
      A: { base: 1, changes: 0, commits: 0 }, 
      B: { base: 1, changes: 0, commits: 0 }
    };
  }
  init();

  function updateUI() {
    document.getElementById('status-cloud').innerText = 'v' + state.cloud_v;
    
    // 電腦 A 更新
    document.getElementById('base-a').innerText = 'v' + state.A.base;
    document.getElementById('commits-a').innerText = state.A.commits;
    document.getElementById('ws-a').innerText = state.A.changes;
    document.getElementById('status-a').innerText = 'v' + (state.A.base + state.A.commits);
    
    // 電腦 B 更新
    document.getElementById('base-b').innerText = 'v' + state.B.base;
    document.getElementById('commits-b').innerText = state.B.commits;
    document.getElementById('ws-b').innerText = state.B.changes;
    document.getElementById('status-b').innerText = 'v' + (state.B.base + state.B.commits);
  }

  function showMsg(text, color = '#f9e2af') {
    const box = document.getElementById('msg-box');
    box.innerText = text;
    box.style.borderLeftColor = color;
    box.style.color = color;
  }

  function resetSim() {
    init();
    updateUI();
    showMsg("系統已重置，一切恢復到初始 v1 狀態。", '#cdd6f4');
  }

  // 核心邏輯處理函數
  function action(type, pc) {
    const me = state[pc];
    
    if (type === 'edit') {
      me.changes++; 
      updateUI();
      showMsg(`【電腦 ${pc}】工作區新增了變更。 (注意：未存檔的 Change 不會算進版本號中)`, '#eba0ac');
    } 
    else if (type === 'commit') {
      if (me.changes > 0) {
        me.changes = 0;
        me.commits++;
        updateUI();
        showMsg(`【電腦 ${pc}】Commit 成功！您手動創造了 1 個歷史節點。\n數學公式：基準點(v${me.base}) + 待推播(${me.commits}) = 總版本(v${me.base + me.commits})`, '#cba6f7');
      } else {
        showMsg(`【電腦 ${pc}】工作區很乾淨，沒有東西可以 Commit。`, '#6c7086');
      }
    }
    else if (type === 'push') {
      if (me.base < state.cloud_v) {
        showMsg(`❌【拒絕推送】平行宇宙發生！\n您的基準點(v${me.base}) 落後於雲端(v${state.cloud_v})。您必須先按 Pull 把它們縫合起來！`, '#f38ba8');
      } else if (me.commits > 0) {
        // 成功推播
        state.cloud_v += me.commits;
        me.base = state.cloud_v;
        me.commits = 0;
        updateUI();
        showMsg(`✅【Push 成功】本地的節點已全數推上雲端！\n雲端更新至 v${state.cloud_v}。您的待推播數量歸零。`, '#89b4fa');
      } else {
        showMsg(`【電腦 ${pc}】待推播數量為 0，無須 Push。`, '#6c7086');
      }
    }
    else if (type === 'pull') {
      if (me.base < state.cloud_v) {
        if (me.commits > 0) {
          // 產生衝突並自動合併 (Merge)
          me.base = state.cloud_v;
          me.commits++; // 產生一個額外的 Merge Commit
          showMsg(`⚠️【平行宇宙縫合 (Merge Commit)】這就是 v4 的真相！\n1. 您的基準點升級為雲端的 v${state.cloud_v}。\n2. Git 無中生有創造了 1 個「膠水節點」來縫合兩邊！\n3. 您的待推播 = 原本自己寫的(1) + 膠水節點(1) = 2。\n總版本 = 基準(v${me.base}) + 待推播(2) = v${me.base + me.commits}！`, '#f9e2af');
        } else {
          // 快速通關 (Fast-forward)
          me.base = state.cloud_v;
          showMsg(`✅【Pull 成功】您本地沒有分支，直接同步雲端進度 (Fast-forward) 至 v${state.cloud_v}。`, '#a6e3a1');
        }
        updateUI();
      } else {
        showMsg(`【電腦 ${pc}】本地已經是最新版，無須 Pull。`, '#6c7086');
      }
    }
  }
</script>

</body>
</html>
