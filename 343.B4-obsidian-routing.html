<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian 前端分流與 Dify 後端樞紐 (自適應版)</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --obsidian: #7a3ee8;
    --gemini: #4285f4;
    --dify: #f59e0b;
    --text-main: #e0e0e0;
    --text-muted: #888;
  }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: var(--bg-color); color: var(--text-main); 
    display: flex; justify-content: center; align-items: center; 
    padding: 15px; margin: 0; min-height: 100vh; box-sizing: border-box;
  }
  
  /* 容器自適應寬度 */
  .container { 
    width: 100%; max-width: 800px; 
    background: var(--card-bg); padding: 20px; 
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
    box-sizing: border-box;
  }
  
  /* 頂部控制區 */
  .header { display: flex; flex-direction: column; gap: 15px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
  .controls select { padding: 10px; border-radius: 6px; background: #2d2d2d; color: white; border: 1px solid #555; font-size: 15px; cursor: pointer; width: 100%; }
  
  /* 畫布區：改用 Flexbox 彈性佈局 */
  .canvas { 
    position: relative; background: #181818; border-radius: 8px; border: 1px solid #333; 
    margin-bottom: 20px; padding: 40px 20px; min-height: 400px;
    display: flex; flex-direction: column; gap: 40px; align-items: center; 
    overflow: hidden;
  }
  
  /* 左側與右側群組 */
  .col-left, .col-right { display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center; z-index: 2; }
  .hub-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }

  /* 節點通用樣式 (移除寫死的 absolute) */
  .node { 
    padding: 12px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; 
    border: 2px solid transparent; z-index: 2; transition: all 0.3s; background: #252535; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; width: fit-content;
  }
  .node small { display: block; font-size: 11px; font-weight: normal; color: #aaa; margin-top: 4px; }
  .node.active { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
  
  /* 節點專屬樣式 */
  #node-phone { border-color: var(--obsidian); }
  #node-cloud { border-color: var(--gemini); }
  #node-dify { border-color: var(--dify); }
  #node-db { border-style: dashed; border-color: #555; color: #aaa; font-size: 12px; }
  .db-active { border-color: var(--dify) !important; color: var(--dify) !important; animation: pulse 1s infinite; }

  /* 生成的檔案與標籤 (改用 opacity 控制顯示，避免排版跳動) */
  #node-file { background: #2d3748; color: #63b3ed; font-size: 13px; border: 1px solid #4a5568; opacity: 0; transition: 0.3s; }
  #node-github { background: #27272a; color: #a1a1aa; font-size: 12px; border: 1px dashed #52525b; opacity: 0; transition: 0.3s; }
  .show-file { opacity: 1 !important; }

  /* 連線標籤 (動態定位) */
  .path-label { position: absolute; font-size: 11px; color: #a1a1aa; background: #181818; padding: 2px 6px; border-radius: 4px; z-index: 2; border: 1px solid #333; }

  /* SVG 連線 */
  svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  .path-line { stroke: #444; stroke-width: 2; stroke-dasharray: 5,5; fill: none; transition: 0.3s; }
  
  /* 動畫封包 */
  #packet { position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; box-shadow: 0 0 12px white; z-index: 10; display: none; transition: all linear; margin-top: -7px; margin-left: -7px; }

  /* 底部按鈕 */
  .actions { display: flex; flex-direction: column; gap: 10px; }
  button { padding: 14px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
  .btn-send { background: var(--obsidian); color: white; flex: 1; }
  .btn-send:hover { background: #6b33cc; }
  .btn-reset { background: #444; color: white; }
  .btn-reset:hover { background: #555; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #status-box { margin-top: 15px; padding: 15px; background: #000; border-radius: 8px; border-left: 4px solid var(--obsidian); font-size: 14px; line-height: 1.5; color: #4ade80; min-height: 45px; }

  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }

  /* =========================================
     電腦與平板自適應 (大於 768px 時恢復左右排列) 
  ========================================= */
  @media (min-width: 768px) {
    .header { flex-direction: row; text-align: left; }
    .controls select { width: auto; min-width: 250px; }
    .actions { flex-direction: row; }
    
    .canvas { flex-direction: row; justify-content: space-between; align-items: stretch; padding: 40px; }
    .col-left { align-items: flex-start; width: 40%; }
    .col-right { align-items: flex-end; width: 50%; justify-content: space-between; }
    .hub-group { flex-direction: row; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h3 style="margin:0;">架構可視化：前端分流邏輯</h3>
    <div class="controls">
      <select id="channel-select" onchange="resetSim()">
        <option value="global">🌍 廣域大腦 (直連 API)</option>
        <option value="cao">🔒 CAO 專利專家 (連線母艦 Dify)</option>
      </select>
    </div>
  </div>

  <div class="canvas" id="canvas-area">
    <svg>
      <line id="line-api" class="path-line" />
      <line id="line-tunnel" class="path-line" />
      <line id="line-db" class="path-line" style="stroke-dasharray: none; stroke: #333;" />
    </svg>

    <div class="path-label" id="label-api">網際網路直連</div>
    <div class="path-label" id="label-tailscale">Tailscale 隧道</div>
    <div id="packet"></div>

    <div class="col-left">
      <div class="node" id="node-phone">📱 Obsidian App<br><small>(S24 Ultra)</small></div>
      <div class="node" id="node-file">📄 <span id="file-name">通用對話.md</span></div>
      <div class="node" id="node-github">🔄 自動同步 GitHub</div>
    </div>

    <div class="col-right">
      <div class="node" id="node-cloud">🌍 雲端 AI<br><small>(Gemini API)</small></div>
      <div class="hub-group">
        <div class="node" id="node-dify">🔒 128GB 母艦<br><small>(Dify Server)</small></div>
        <div class="node" id="node-db">🗄️ FTO 知識庫<br><small>(2筆專利)</small></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="btn-send" class="btn-send" onclick="startFlow()">發送訊號</button>
    <button class="btn-reset" onclick="resetSim()">🔄 重置</button>
  </div>

  <div id="status-box">準備就緒。請選擇通道並發送訊號。</div>
</div>

<script>
  const packet = document.getElementById('packet');
  const statusBox = document.getElementById('status-box');
  const channelSelect = document.getElementById('channel-select');
  const btnSend = document.getElementById('btn-send');
  const canvasArea = document.getElementById('canvas-area');
  
  const nodePhone = document.getElementById('node-phone');
  const nodeCloud = document.getElementById('node-cloud');
  const nodeDify = document.getElementById('node-dify');
  const nodeDb = document.getElementById('node-db');
  const nodeFile = document.getElementById('node-file');
  const fileName = document.getElementById('file-name');
  const nodeGithub = document.getElementById('node-github');

  const lineApi = document.getElementById('line-api');
  const lineTunnel = document.getElementById('line-tunnel');
  const lineDb = document.getElementById('line-db');
  
  const labelApi = document.getElementById('label-api');
  const labelTailscale = document.getElementById('label-tailscale');

  // 計算座標以繪製線條與移動動畫
  function getCenter(el) {
    const rect = el.getBoundingClientRect();
    const canvasRect = canvasArea.getBoundingClientRect();
    return {
      x: rect.left - canvasRect.left + rect.width / 2,
      y: rect.top - canvasRect.top + rect.height / 2
    };
  }

  // 雷達追蹤系統：動態繪製所有連線與標籤
  function drawLines() {
    const pPhone = getCenter(nodePhone);
    const pCloud = getCenter(nodeCloud);
    const pDify = getCenter(nodeDify);
    const pDb = getCenter(nodeDb);

    // 畫線
    lineApi.setAttribute('x1', pPhone.x); lineApi.setAttribute('y1', pPhone.y);
    lineApi.setAttribute('x2', pCloud.x); lineApi.setAttribute('y2', pCloud.y);

    lineTunnel.setAttribute('x1', pPhone.x); lineTunnel.setAttribute('y1', pPhone.y);
    lineTunnel.setAttribute('x2', pDify.x); lineTunnel.setAttribute('y2', pDify.y);

    lineDb.setAttribute('x1', pDify.x); lineDb.setAttribute('y1', pDify.y);
    lineDb.setAttribute('x2', pDb.x); lineDb.setAttribute('y2', pDb.y);

    // 標籤定位 (放置於連線中心點)
    labelApi.style.left = ((pPhone.x + pCloud.x) / 2 - 40) + 'px';
    labelApi.style.top = ((pPhone.y + pCloud.y) / 2 - 15) + 'px';

    labelTailscale.style.left = ((pPhone.x + pDify.x) / 2 - 45) + 'px';
    labelTailscale.style.top = ((pPhone.y + pDify.y) / 2 - 15) + 'px';
  }

  // 視窗縮放時自動重新計算
  window.addEventListener('resize', drawLines);

  function setStatus(msg) { statusBox.innerHTML = msg; }

  function resetSim() {
    // 延遲繪製以確保排版已穩定
    setTimeout(drawLines, 50);
    
    packet.style.display = 'none';
    packet.style.transition = 'none';
    btnSend.disabled = false;
    
    nodeCloud.classList.remove('active');
    nodeDify.classList.remove('active');
    nodeDb.classList.remove('db-active');
    
    // 隱藏產生的檔案
    nodeFile.classList.remove('show-file');
    nodeGithub.classList.remove('show-file');
    nodeFile.style.borderLeftColor = 'transparent';
    
    setStatus(`系統已重置。目前選擇模式：<b>${channelSelect.options[channelSelect.selectedIndex].text}</b>`);
  }

  async function movePacket(startEl, endEl, durationSec, color) {
    const from = getCenter(startEl);
    const to = getCenter(endEl);
    
    packet.style.display = 'block';
    packet.style.transition = 'none';
    packet.style.left = from.x + 'px';
    packet.style.top = from.y + 'px';
    packet.style.background = color;
    packet.style.boxShadow = `0 0 12px ${color}`;
    
    await new Promise(r => setTimeout(r, 50)); 
    
    packet.style.transition = `all ${durationSec}s cubic-bezier(0.4, 0, 0.2, 1)`;
    packet.style.left = to.x + 'px';
    packet.style.top = to.y + 'px';
    
    await new Promise(r => setTimeout(r, durationSec * 1000));
  }

  async function startFlow() {
    btnSend.disabled = true;
    const mode = channelSelect.value;

    if (mode === 'global') {
      setStatus("訊號發送中：手機直連雲端 AI...");
      nodePhone.classList.add('active');
      
      await movePacket(nodePhone, nodeCloud, 0.8, '#4285f4'); 
      
      nodePhone.classList.remove('active');
      nodeCloud.classList.add('active');
      setStatus("雲端處理中...");
      await new Promise(r => setTimeout(r, 600));
      
      setStatus("回傳結果...");
      await movePacket(nodeCloud, nodePhone, 0.8, '#4285f4');
      packet.style.display = 'none';
      nodeCloud.classList.remove('active');
      
      // 顯示結果
      fileName.innerText = "通用對話.md";
      nodeFile.classList.add('show-file');
      await new Promise(r => setTimeout(r, 400));
      nodeGithub.classList.add('show-file');
      
      setStatus("<b>這是不受限的世界知識，適合一般諮詢與創意發想。</b>");

    } else if (mode === 'cao') {
      setStatus("訊號發送中：穿過 Tailscale 隧道前往母艦...");
      nodePhone.classList.add('active');
      
      await movePacket(nodePhone, nodeDify, 1.0, '#f59e0b'); 
      
      nodePhone.classList.remove('active');
      nodeDify.classList.add('active');
      packet.style.display = 'none';
      
      setStatus("Dify 正在檢索 <b>FTO 知識庫 (2筆專利)</b>...");
      nodeDb.classList.add('db-active'); 
      await new Promise(r => setTimeout(r, 1500)); 
      
      nodeDb.classList.remove('db-active');
      setStatus("檢索完畢，母艦回傳分析結果...");
      
      await movePacket(nodeDify, nodePhone, 1.0, '#f59e0b');
      packet.style.display = 'none';
      nodeDify.classList.remove('active');
      
      // 顯示結果
      fileName.innerText = "專利分析.md";
      nodeFile.style.borderLeft = "4px solid #f59e0b"; 
      nodeFile.classList.add('show-file');
      await new Promise(r => setTimeout(r, 400));
      nodeGithub.classList.add('show-file');
      
      setStatus("<b>這是受限的專業知識，嚴格基於專利庫內容回覆，用於 FTO 侵權判定。</b>");
    }
    
    btnSend.disabled = false;
  }

  // 初次載入與繪製
  setTimeout(resetSim, 150);
</script>

</body>
</html>
