<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --accent: #38bdf8;
    --terminal: #10b981;
    --brain: #f59e0b;
    --engine: #8b5cf6;
  }
  body { font-family: sans-serif; background: var(--bg-color); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
  .container { width: 100%; max-width: 700px; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  /* 選項切換區 */
  .settings { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
  select { padding: 8px; border-radius: 4px; background: #334155; color: white; border: 1px solid var(--accent); cursor: pointer; }

  /* 視覺呈現區 */
  .canvas { position: relative; height: 350px; border: 1px dashed #475569; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  .layer { position: absolute; width: 120px; text-align: center; font-size: 12px; }
  .layer-icon { font-size: 32px; margin-bottom: 5px; }
  
  /* 分層位置 */
  #layer-terminal { left: 50px; top: 140px; color: var(--terminal); }
  #layer-brain { left: 290px; top: 140px; color: var(--brain); }
  #layer-engine { left: 530px; top: 140px; color: var(--engine); }

  /* 連線標籤 */
  .line-label { position: absolute; font-size: 10px; color: #94a3b8; text-align: center; width: 120px; transform: translateY(-20px); }
  #label-connection { left: 170px; top: 185px; }
  #label-api { left: 410px; top: 185px; }

  /* 動畫封包 */
  #packet {
    position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%;
    box-shadow: 0 0 10px white; display: none; z-index: 10;
  }

  /* 控制與狀態 */
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .btn-send { background: var(--accent); color: #000; }
  .btn-reset { background: #475569; color: white; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  
  #status-box {
    margin-top: 15px; padding: 15px; background: #000; border-radius: 8px;
    font-family: monospace; font-size: 14px; color: #2dd4bf; border-left: 4px solid var(--accent);
  }
</style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center; margin-top:0;">CAO API 流程視覺化</h2>

  <div class="settings">
    <span>Dify 部署位置：</span>
    <select id="deploy-mode" onchange="resetSim()">
      <option value="local">地端 128GB 母艦 (Local PC)</option>
      <option value="cloud">雲端伺服器 (Cloud)</option>
    </select>
  </div>

  <div class="canvas">
    <svg width="100%" height="100%" style="position:absolute; top:0; left:0;">
      <line x1="110" y1="175" x2="290" y2="175" stroke="#475569" stroke-width="2" stroke-dasharray="5,5" />
      <line x1="410" y1="175" x2="530" y2="175" stroke="#475569" stroke-width="2" stroke-dasharray="5,5" />
    </svg>

    <div id="packet"></div>

    <div class="layer" id="layer-terminal">
      <div class="layer-icon">📱</div>
      <b>終端設備</b><br>S24 Ultra
    </div>

    <div class="line-label" id="label-connection">Tailscale 虛擬內網</div>

    <div class="layer" id="layer-brain">
      <div class="layer-icon">🧠</div>
      <b>核心大腦</b><br>Dify Server
    </div>

    <div class="line-label" id="label-api">AWS API (網際網路)</div>

    <div class="layer" id="layer-engine">
      <div class="layer-icon">⚡</div>
      <b>算力引擎</b><br>Claude 3.5
    </div>
  </div>

  <div class="controls">
    <button id="send-btn" class="btn-send" onclick="startFlow()">發送 CAO 總結請求</button>
    <button class="btn-reset" onclick="resetSim()">🔄 重置系統</button>
  </div>

  <div id="status-box">系統就緒。等待指令...</div>
</div>

<script>
  const packet = document.getElementById('packet');
  const statusBox = document.getElementById('status-box');
  const deployMode = document.getElementById('deploy-mode');
  const connLabel = document.getElementById('label-connection');
  const sendBtn = document.getElementById('send-btn');

  const positions = {
    terminal: { x: 104, y: 169 },
    brain: { x: 344, y: 169 },
    engine: { x: 584, y: 169 }
  };

  function setStatus(msg) { statusBox.innerText = "> " + msg; }

  function resetSim() {
    // 停止所有動畫
    packet.style.display = 'none';
    packet.style.transition = 'none';
    sendBtn.disabled = false;
    
    // 更新連線標籤
    if (deployMode.value === 'local') {
      connLabel.innerText = "Tailscale 虛擬內網 (100.x.x.x)";
      setStatus("已切換至地端模式。透過 Tailscale 安全連線。");
    } else {
      connLabel.innerText = "網際網路 (Internet)";
      setStatus("已切換至雲端模式。透過網際網路連線。");
    }
  }

  async function movePacket(from, to, duration) {
    packet.style.display = 'block';
    packet.style.transition = 'none';
    packet.style.left = from.x + 'px';
    packet.style.top = from.y + 'px';
    
    await new Promise(r => setTimeout(r, 50)); // 強制渲染
    
    packet.style.transition = `all ${duration}s linear`;
    packet.style.left = to.x + 'px';
    packet.style.top = to.y + 'px';
    
    await new Promise(r => setTimeout(r, duration * 1000));
  }

  async function startFlow() {
    sendBtn.disabled = true;
    
    // 1. Terminal -> Brain
    setStatus("S24 Ultra 發送請求...");
    await movePacket(positions.terminal, positions.brain, 0.8);
    
    // 2. Brain -> Engine
    setStatus("Dify 接收並啟動工作流，調用 Claude 3.5...");
    await movePacket(positions.brain, positions.engine, 0.8);
    
    // 3. Engine Computing
    setStatus("Claude 3.5 運算中...");
    packet.style.display = 'none';
    await new Promise(r => setTimeout(r, 1000));
    
    // 4. Engine -> Brain
    setStatus("收到運算結果，傳回 Dify 處理中...");
    await movePacket(positions.engine, positions.brain, 0.8);
    
    // 5. Brain -> Terminal
    setStatus("結果回傳至手機！");
    await movePacket(positions.brain, positions.terminal, 0.8);
    
    await new Promise(r => setTimeout(r, 500));
    packet.style.display = 'none';
    sendBtn.disabled = false;
  }

  // 初始化
  resetSim();
</script>

</body>
</html>
